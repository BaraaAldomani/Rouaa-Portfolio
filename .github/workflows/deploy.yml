# ─────────────────────────────────────────────────────────────────────────────
# CI/CD: build the Laravel app on GitHub's runners, then deploy to Hostinger
# (shared hosting) over SSH with rsync. Runs on every push to main/master.
#
# Required repo secrets (Settings → Secrets and variables → Actions → New secret).
# See deploy/CICD.md:
#   SSH_PRIVATE_KEY  the full private key (-----BEGIN ... END-----)
#   SSH_HOST         e.g. 123.45.67.89  or your server hostname
#   SSH_USER         e.g. u744145577
#   SSH_PORT         Hostinger shared hosting is usually 65002 (not 22)
#   DEPLOY_PATH      e.g. /home/u744145577/public_html
#   PHP_BIN          server CLI php must be 8.3. On CloudLinux set to the full
#                    path /opt/alt/php83/usr/bin/php. Defaults to "php".
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy to Hostinger

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}   # lets you trigger a deploy manually from the Actions tab

# Cancel an in-progress deploy if you push again before it finishes.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) PHP + Composer dependencies → vendor/
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, gd, zip, pdo, pdo_mysql, bcmath, mbstring

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-progress

      # 2) Front-end assets → public/build/
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build assets
        run: |
          npm ci
          npm run build

      # 3) Ship to Hostinger, then run remote artisan commands
      - name: Deploy over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PHP_BIN: ${{ secrets.PHP_BIN || 'php' }}
          # Optional. When set, the server decrypts .env.production.encrypted
          # into .env on every deploy, so environment changes ship through git
          # and nobody has to edit .env over SSH. When unset, the existing
          # server-side .env is left completely untouched.
          ENV_ENCRYPTION_KEY: ${{ secrets.LARAVEL_ENV_ENCRYPTION_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # Strip any Windows CR characters that can mangle a pasted key.
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Diagnostics. A fingerprint is public information (it is derived from
          # the PUBLIC half), so this leaks nothing — but it makes a rejected key
          # trivial to diagnose: compare it against the server's authorized_keys
          #   ssh-keygen -lf ~/.ssh/authorized_keys
          # If the fingerprint below is absent there, the wrong key is installed.
          echo "::group::deploy key fingerprint"
          ssh-keygen -lf ~/.ssh/deploy_key \
            || echo "!! key is malformed - the SSH_PRIVATE_KEY secret is truncated or not a private key"
          echo "::endgroup::"

          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          # Auth probe. -v so a rejection shows which key was offered and why.
          ssh -v -p "$SSH_PORT" -i ~/.ssh/deploy_key -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" 'echo SSH_OK; whoami; pwd'

          # Sync the app. No --delete: server-side .env and uploaded images are safe.
          rsync -az --no-perms --no-owner --no-group \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='deploy/' \
            --exclude='tests/' \
            --exclude='.env' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key" \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

          # Rebuild on the server. The stale-cache purge MUST be plain `rm`, not
          # an artisan command: every artisan command boots the full framework
          # first, and a cached config.php left by a previous deploy (rsync has
          # no --delete and the runner never generates one) makes package
          # providers boot against outdated config and crash before the command
          # runs (symptom: CannotRegisterIconSet "heroicons set has no prefix").
          # Deleting the cached files with rm involves no PHP boot, so it always
          # works; everything after boots against fresh, correct config.
          #
          # The env step below rebuilds .env from the encrypted bundle committed
          # in the repo, so production config is edited locally and shipped by
          # git — never hand-edited over SSH. It runs before optimize:clear and
          # migrate so both see the fresh values. Skipped entirely when
          # LARAVEL_ENV_ENCRYPTION_KEY is not set.
          #
          # First deploy only (run once by hand over SSH, NOT in this pipeline, so
          # later deploys never overwrite content you edit in the dashboard):
          #   $PHP_BIN artisan db:seed --force        # initial content + settings
          #   $PHP_BIN artisan app:create-admin       # uses ADMIN_EMAIL / ADMIN_PASSWORD from .env
          ssh -p "$SSH_PORT" -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "set -e; cd '$DEPLOY_PATH'; \
            rm -f bootstrap/cache/config.php bootstrap/cache/routes-v7.php bootstrap/cache/events.php; \
            [ -f .env ] || cp .env.example .env; \
            if [ -n '$ENV_ENCRYPTION_KEY' ]; then \
              cp .env .env.backup 2>/dev/null || true; \
              LARAVEL_ENV_ENCRYPTION_KEY='$ENV_ENCRYPTION_KEY' $PHP_BIN artisan env:decrypt --env=production --force; \
              mv -f .env.production .env; \
              chmod 600 .env; \
              echo 'env: rebuilt .env from .env.production.encrypted'; \
            else \
              echo 'env: LARAVEL_ENV_ENCRYPTION_KEY unset - leaving server .env untouched'; \
            fi; \
            $PHP_BIN artisan optimize:clear; \
            $PHP_BIN artisan migrate --force; \
            $PHP_BIN artisan filament:assets; \
            $PHP_BIN artisan storage:link || true; \
            $PHP_BIN artisan config:cache; \
            $PHP_BIN artisan route:cache; \
            $PHP_BIN artisan view:cache"
